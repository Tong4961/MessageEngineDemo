server:
  port: 12002
  servlet:
    context-path: "/bp"

spring:
  application:
    name: bp
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://54.145.211.227:5432/postgres
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: 54.145.211.227
      port: 6379
      password: 123456
      database: 0
      timeout: 6000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

mybatis-flex:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

rocketmq:
  producer:
    endpoints: 54.145.211.227:8080
  push-consumer:
     endpoints: 54.145.211.227:8080

logging:
  level:
    root: INFO